      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Profile ───────────────────────────────────────────────── */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid #333;
      flex-shrink: 0;
      margin-bottom: 20px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      filter: grayscale(100%);
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      font-style: italic;
      color: #ede8e0;
      text-align: center;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.82rem;
      color: #888;
      text-align: center;
      letter-spacing: 0.06em;
      margin-bottom: 24px;
    }

    /* ── Social icons ──────────────────────────────────────────── */
    .socials {
      display: flex;
      gap: 16px;
      margin-bottom: 36px;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #2a2a2a;
      color: #888;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .social-icon:hover { border-color: #888; color: #ede8e0; }
    .social-icon svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── Link buttons ──────────────────────────────────────────── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-bottom: 40px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #ede8e0;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }

    .link-btn:hover {
      border-color: #555;
      background: rgba(255,255,255,0.04);
    }

    .link-btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    /* ── Image gallery ─────────────────────────────────────────── */
    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      margin-bottom: 40px;
    }

    .gallery-img {
      aspect-ratio: 1/1;
      overflow: hidden;
    }

    .gallery-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 60%;
      filter: grayscale(100%);
      display: block;
      transition: transform 0.4s;
    }

    .gallery-img:hover img { transform: scale(1.03); }

    /* ── Footer link ───────────────────────────────────────────── */

      font-style: italic;
      font-weight: 300;

      text-align: center;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
